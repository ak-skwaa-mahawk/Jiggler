mkdir -p proto
cat << 'EOF' > proto/combined_manifold.proto
syntax = "proto3";

package combined_manifold;

// Channel 1: Original Production Inference Routing
service InferenceService {
    rpc GetIntentBand (GetIntentBandRequest) returns (IntentBand);
    rpc GetAllIntentBands (GetAllIntentBandsRequest) returns (GetAllIntentBandsResponse);
    rpc StreamIntentUpdates (StreamIntentUpdatesRequest) returns (stream IntentUpdate);
    rpc Handshake (HandshakeRequest) returns (HandshakeResponse);
}

// Channel 2: Advanced 3D Physics Tensor Ingress Lane
service ManifoldController {
    rpc SynchronizeVector (VectorPayload) returns (SubstrateMetricsResponse);
}

// --- Structural Message Packages ---
message GetIntentBandRequest { string band_id = 1; }
message GetAllIntentBandsRequest {}
message GetAllIntentBandsResponse { repeated IntentBand bands = 1; }
message StreamIntentUpdatesRequest {}
message IntentUpdate { string update_id = 1; string payload = 2; }
message HandshakeRequest { string client_id = 1; string client_type = 2; bool sovereign_claim = 3; }
message HandshakeResponse { string status = 1; string version = 2; string mesh_status = 3; string flamekeeper_note = 4; }

message IntentBand {
    string band_id = 1;
    double energy_delta = 2;
    double spin = 3;
    double temp = 4;
}

message Vector3D {
    double x = 1;
    double y = 2;
    double z = 3;
}

message VectorPayload {
    string vector_id = 1;
    Vector3D velocity_vector = 2;
    double throat_radius = 3;
    double magnetic_coupling = 4;
}

message SubstrateMetricsResponse {
    string status = 1;
    string version = 2;
    string mesh_status = 3;
    bool processing_stable = 4;
    uint64 execution_ticks = 5;
}
EOF
