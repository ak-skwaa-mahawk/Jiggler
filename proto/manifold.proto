syntax = "proto3";

package tordial;

enum GsBand {
    GS_BAND_UNKNOWN = 0;
    GS_BAND_SUBCRITICAL = 1;
    GS_BAND_MARGINAL = 2;
    GS_BAND_GOLDILOCKS = 3;
    GS_BAND_DEEP_GS = 4;
}

message EconomicVector {
    double capital_velocity = 1;
    double regulatory_drag = 2;
    double yield_generation = 3;
}

message SapFluxVector {
    double fm_norm = 1;
    double raw_velocity_mms = 2;
    double temp_c = 3;
    double pressure_kpa = 4;
}

message GsBandState {
    GsBand band = 1;
    double score = 2;
    double live_curvature = 3;
    double target_curvature = 4;
    double belt_tension = 5;
    double throat_radius = 6;
}

message SyncAck {
    string status = 1;
    GsBandState gs_state = 2;
}

message ManifoldTick {
    string vector_id = 1;
    EconomicVector economic_vector = 2;
    SapFluxVector sap_flux_vector = 3;
    double vault_depth = 4;
    double liquidity_coupling = 5;
    int64 ts_utc = 6;
}

service InferenceService {
    rpc Synchronize (ManifoldTick) returns (SyncAck);
}
