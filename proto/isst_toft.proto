cat > proto/isst_toft.proto << 'ENDPROTO'
syntax = "proto3";

package issttoft;

import "google/protobuf/empty.proto";

// =====================================================
// ISST-TOFT Sovereign Inference Service
// Single clean service definition
// =====================================================
service InferenceService {
  // === Core Services ===
  rpc EncodeRadHardGlyph (GlyphRequest) returns (GlyphResponse);
  rpc RunClientlessPulse (PulseRequest) returns (PulseResponse);

  // === Intent Engine (Read) ===
  rpc GetIntentBand     (GetIntentBandRequest)     returns (IntentBand);
  rpc GetAllIntentBands (GetAllIntentBandsRequest) returns (GetAllIntentBandsResponse);

  // === Real-time Streaming ===
  rpc StreamIntentUpdates (StreamIntentUpdatesRequest) returns (stream IntentUpdate);

  // === Handshake + CERN Sovereign Mesh ===
  rpc Handshake (HandshakeRequest) returns (HandshakeResponse);
}

// ====================== MESSAGES ======================

message GlyphRequest { repeated float terrain_data = 1; bool use_agentic = 2; }
message GlyphResponse {
  repeated float refined_waveform = 1;
  uint64 waveform_checksum = 2;
  string status = 3;
  float coherence = 4;
  string message = 5;
  string quantum_layer = 6;
  float toroidal_pi_r = 7;
}

message PulseRequest { repeated float feed_data = 1; }
message PulseResponse {
  repeated float refined_signal = 1;
  string status = 2;
  float coherence = 3;
  string message = 4;
  float toroidal_pi_r = 5;
}

message GetIntentBandRequest { string band_id = 1; int32 mode = 2; }
message GetAllIntentBandsRequest {}

message IntentBand {
  string band_id = 1;
  int32 mode = 2;
  double intent_value = 3;
  int64 last_updated = 4;
  string source = 5;
}
message GetAllIntentBandsResponse { repeated IntentBand bands = 1; }

message StreamIntentUpdatesRequest {}
message IntentUpdate {
  string band_id = 1;
  int32 mode = 2;
  double intent_value = 3;
  int64 timestamp = 4;
  string reason = 5; // "drive" | "catapult" | "vhitzee" | "decay" | "safety"
}

message HandshakeRequest {
  string client_id = 1;
  string client_type = 2;
  string sovereign_claim = 3;
}
message HandshakeResponse {
  repeated IntentBand initial_bands = 1;
  string server_version = 2;
  int64 server_time = 3;
  string mesh_status = 4;
  string flamekeeper_note = 5;
}

message CernResonanceUpdate {
  double resonance_energy = 1;
  string event_type = 2;
  int64 timestamp = 3;
}
ENDPROTO