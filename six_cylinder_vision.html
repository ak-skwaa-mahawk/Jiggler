<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6-Cylindrical Boundary System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --core: #00ffcc;
    --expansion: #ff6b00;
    --cap: #cc00ff;
    --bg: #030810;
    --grid: rgba(0,255,204,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--core);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridShift 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridShift {
    0%   { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  header {
    text-align: center;
    padding: 1.5rem 1rem 0.4rem;
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.9rem, 3.5vw, 1.8rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--core);
    text-shadow: 0 0 30px var(--core), 0 0 60px rgba(0,255,204,0.3);
  }

  header .constants {
    font-size: 0.65rem;
    opacity: 0.55;
    margin-top: 0.35rem;
    letter-spacing: 0.1em;
  }

  /* live delta badge */
  .delta-badge {
    display: inline-block;
    margin-left: 1rem;
    font-size: 0.6rem;
    padding: 0.1rem 0.45rem;
    border-radius: 20px;
    border: 1px solid rgba(0,255,204,0.3);
    color: var(--core);
    opacity: 0.8;
    vertical-align: middle;
  }

  .stage {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 0.5rem 1rem;
  }

  canvas#main {
    display: block;
    max-width: 580px;
    width: 100%;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.3rem 1rem 0.8rem;
  }

  .ctrl-group {
    background: rgba(0,255,204,0.04);
    border: 1px solid rgba(0,255,204,0.15);
    border-radius: 6px;
    padding: 0.45rem 0.7rem;
    min-width: 130px;
  }

  .ctrl-group label {
    display: block;
    font-size: 0.58rem;
    opacity: 0.6;
    letter-spacing: 0.08em;
    margin-bottom: 0.25rem;
    text-transform: uppercase;
  }

  .ctrl-group input[type=range] {
    width: 100%;
    accent-color: var(--core);
    cursor: pointer;
  }

  .ctrl-group .val {
    font-size: 0.62rem;
    text-align: right;
    opacity: 0.8;
    margin-top: 0.15rem;
  }

  .flow-readout {
    display: flex;
    justify-content: center;
    gap: 1rem;
    padding: 0.2rem 1rem 0.5rem;
    font-size: 0.6rem;
    opacity: 0.7;
    flex-wrap: wrap;
  }

  .flow-readout .lbl { opacity: 0.5; }

  /* flux balance bar */
  .flux-bar-wrap {
    max-width: 580px;
    margin: 0 auto;
    padding: 0 1rem 0.6rem;
  }

  .flux-bar-label {
    font-size: 0.55rem;
    opacity: 0.45;
    letter-spacing: 0.08em;
    margin-bottom: 0.2rem;
    text-align: center;
  }

  .flux-bar {
    display: flex;
    height: 6px;
    border-radius: 4px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
  }

  .flux-seg { transition: width 0.2s ease; }
  .flux-seg.intake  { background: #00ffcc; }
  .flux-seg.transit { background: #ffffff; }
  .flux-seg.exhaust { background: #ff8c00; }
  .flux-seg.ret     { background: #cc00ff; }

  .status {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    padding: 0.4rem 1rem 1.2rem;
    max-width: 640px;
    margin: 0 auto;
  }

  .face-card {
    border-radius: 6px;
    padding: 0.45rem 0.55rem;
    font-size: 0.58rem;
    letter-spacing: 0.05em;
  }

  .face-card.core   { border: 1px solid var(--core);      background: rgba(0,255,204,0.05); }
  .face-card.expand { border: 1px solid var(--expansion);  background: rgba(255,107,0,0.05); }
  .face-card.cap    { border: 1px solid var(--cap);        background: rgba(204,0,255,0.05); }

  .face-card .face-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
    letter-spacing: 0.1em;
  }

  .face-card.core   .face-title { color: var(--core); }
  .face-card.expand .face-title { color: var(--expansion); }
  .face-card.cap    .face-title { color: var(--cap); }

  .face-card .metric { opacity: 0.75; line-height: 1.65; }
</style>
</head>
<body>

<header>
  <h1>6-CYLINDRICAL BOUNDARY SYSTEM</h1>
  <div class="constants">
    TR: 3.1730059 &nbsp;|&nbsp; GS: 1.02 &nbsp;|&nbsp; SH: 1.03
    <span class="delta-badge">Δ <span id="deltaVal">0.00000000</span></span>
  </div>
</header>

<div class="stage">
  <canvas id="main" width="580" height="580"></canvas>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Spin Velocity</label>
    <input type="range" id="spin" min="0.1" max="5" step="0.1" value="1.5">
    <div class="val" id="spinVal">1.50</div>
  </div>
  <div class="ctrl-group">
    <label>Pressure</label>
    <input type="range" id="pressure" min="0.2" max="2" step="0.05" value="1">
    <div class="val" id="pressureVal">1.00</div>
  </div>
  <div class="ctrl-group">
    <label>Temp Spike</label>
    <input type="range" id="temp" min="0" max="1" step="0.01" value="0">
    <div class="val" id="tempVal">0.00</div>
  </div>
  <div class="ctrl-group">
    <label>Expansion Belt</label>
    <input type="range" id="belt" min="0.5" max="2" step="0.05" value="1">
    <div class="val" id="beltVal">1.00</div>
  </div>
  <div class="ctrl-group">
    <label>Particle Count</label>
    <input type="range" id="pcount" min="20" max="200" step="10" value="80">
    <div class="val" id="pcountVal">80</div>
  </div>
</div>

<div class="flow-readout">
  <span><span class="lbl">INTAKE: </span><span id="intakeFlux">—</span></span>
  <span><span class="lbl">EXHAUST: </span><span id="exhaustFlux">—</span></span>
  <span><span class="lbl">BELT DENSITY: </span><span id="beltDensity">—</span></span>
  <span><span class="lbl">CAP RETURN: </span><span id="capReturn">—</span></span>
  <span><span class="lbl">THROAT V: </span><span id="throatV">—</span></span>
</div>

<div class="flux-bar-wrap">
  <div class="flux-bar-label">PARTICLE PHASE DISTRIBUTION</div>
  <div class="flux-bar">
    <div class="flux-seg intake"  id="barIntake"  style="width:25%"></div>
    <div class="flux-seg transit" id="barTransit" style="width:25%"></div>
    <div class="flux-seg exhaust" id="barExhaust" style="width:25%"></div>
    <div class="flux-seg ret"     id="barReturn"  style="width:25%"></div>
  </div>
</div>

<div class="status" id="status"></div>

<script>
// ── Calibrated constants (mirrors six_cylinder_boundary.py) ──
const TOROIDAL_ROOT = 3.1730059;   // calibrated for GEAR_SHIFT = 1.02
const GEAR_SHIFT    = 1.02;        // universal stabilizer — immutable
const SHADOW        = 1.03;        // shadow constant

const canvas = document.getElementById('main');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2;

const sliders = {
  spin:     document.getElementById('spin'),
  pressure: document.getElementById('pressure'),
  temp:     document.getElementById('temp'),
  belt:     document.getElementById('belt'),
  pcount:   document.getElementById('pcount'),
};
const vals = {
  spin:     document.getElementById('spinVal'),
  pressure: document.getElementById('pressureVal'),
  temp:     document.getElementById('tempVal'),
  belt:     document.getElementById('beltVal'),
  pcount:   document.getElementById('pcountVal'),
};

Object.keys(sliders).forEach(k => {
  sliders[k].addEventListener('input', () => {
    vals[k].textContent = parseFloat(sliders[k].value).toFixed(2);
  });
});

let angle = 0;
let time  = 0;

// ── Geometry (exact mirror of Python compute()) ───────────────
function computeFaces(spin, pressure, temp, beltMod) {
  spin     = Math.max(0.01, spin);
  pressure = Math.max(0.01, pressure);
  temp     = Math.max(0, Math.min(1, temp));
  beltMod  = Math.max(0.1, beltMod);

  const coreCurvature = (TOROIDAL_ROOT / Math.PI) * spin * SHADOW;
  const coreRadius    = (60 * pressure) / coreCurvature;
  const coreThroat    = coreRadius * (1.0 - 0.15 * temp);

  const beltCurvature = coreCurvature * GEAR_SHIFT * beltMod;
  const beltRadius    = coreRadius * beltCurvature;

  const capCurvature  = 1.0 / (beltCurvature * SHADOW);
  const capRadius     = beltRadius * capCurvature;

  return {
    core: { curvature: coreCurvature, radius: coreRadius, throat: coreThroat, role: 'Intake · Exhaust' },
    belt: { curvature: beltCurvature, radius: beltRadius, throat: beltRadius, role: 'Expansion Belt'   },
    cap:  { curvature: capCurvature,  radius: capRadius,  throat: capRadius,  role: 'Containment Caps' },
  };
}

// ── Derived metrics (exact mirror of Python) ──────────────────
function fluxBalance(faces, spin) {
  const intakeFlux  = faces.core.throat * TOROIDAL_ROOT * spin;
  const exhaustFlux = intakeFlux * SHADOW;
  const beltDensity = faces.belt.radius / (faces.core.throat + 1e-9) * GEAR_SHIFT;
  const capReturn   = 1.0 / (beltDensity * SHADOW + 1e-9);
  return { intakeFlux, exhaustFlux, beltDensity, capReturn };
}

function throatVelocity(faces, spin) {
  return (spin * TOROIDAL_ROOT * GEAR_SHIFT) / (faces.core.throat + 1e-9);
}

function closedLoopDelta(faces) {
  return faces.belt.curvature * faces.cap.curvature * SHADOW - 1.0;
}

// ── Particle system ───────────────────────────────────────────
const particles = [];

function spawnParticle(beltR, i, total) {
  const theta = (i / Math.max(total, 1)) * Math.PI * 2 + Math.random() * 0.5;
  return {
    r: beltR * 0.95, theta,
    dr: 0, dtheta: 0,
    phase: 0, life: 0,
    maxLife: 180 + Math.floor(Math.random() * 120),
    size: 0.8 + Math.random() * 1.4,
    trailX: [], trailY: [],
  };
}

function updateParticles(faces, spin, temp) {
  const throatR = faces.core.throat * 0.5;
  const beltR   = faces.belt.radius;
  const target  = parseInt(sliders.pcount.value);

  while (particles.length < target) particles.push(spawnParticle(beltR, particles.length, target));
  while (particles.length > target) particles.shift();

  let counts = { INTAKE: 0, TRANSIT: 0, EXHAUST: 0, RETURN: 0 };

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life++;

    if (p.life > p.maxLife) {
      particles.splice(i, 1);
      particles.push(spawnParticle(beltR, particles.length, target));
      continue;
    }

    if (p.phase === 0) {
      const spd = 0.6 + spin * 0.4;
      p.dr     = -spd * (p.r / beltR);
      p.dtheta =  spd * TOROIDAL_ROOT * 0.08;
      p.r     += p.dr;   p.theta += p.dtheta;
      if (p.r <= throatR * 1.1) p.phase = 1;

    } else if (p.phase === 1) {
      const compress = 1.0 + temp * 2.5;
      p.dtheta = GEAR_SHIFT * compress * 0.18;
      p.theta += p.dtheta;
      p.r = throatR * (0.85 + 0.15 * Math.sin(p.life * 0.4));
      if (p.life % Math.max(1, Math.floor(15 / (spin * 0.5 + 0.5))) === 0) p.phase = 2;

    } else if (p.phase === 2) {
      const jetSpd = (1.0 + spin * 0.5) * SHADOW;
      p.dr = jetSpd * 0.9;   p.dtheta = 0.04;
      p.r += p.dr;   p.theta += p.dtheta;
      if (p.r >= beltR * 0.9) p.phase = 3;

    } else if (p.phase === 3) {
      p.dr     = -(0.3 + spin * 0.15);
      p.dtheta = GEAR_SHIFT * 0.06;
      p.r += p.dr;   p.theta += p.dtheta;
      if (p.r <= throatR * 1.4) { p.phase = 0; p.r = beltR * 0.95; }
    }

    p.r = Math.max(throatR * 0.4, Math.min(beltR * 1.15, p.r));

    const px = cx + Math.cos(p.theta) * p.r;
    const py = cy + Math.sin(p.theta) * p.r;
    p.trailX.push(px); p.trailY.push(py);
    if (p.trailX.length > 8) { p.trailX.shift(); p.trailY.shift(); }

    const names = ['INTAKE','TRANSIT','EXHAUST','RETURN'];
    counts[names[p.phase]]++;
  }

  return counts;
}

function drawParticles() {
  for (const p of particles) {
    if (p.trailX.length < 2) continue;
    const colors = [[0,255,204],[255,255,255],[255,140,0],[200,0,255]];
    const c = colors[p.phase];

    for (let t = 1; t < p.trailX.length; t++) {
      const alpha = (t / p.trailX.length) * 0.7;
      ctx.beginPath();
      ctx.moveTo(p.trailX[t-1], p.trailY[t-1]);
      ctx.lineTo(p.trailX[t],   p.trailY[t]);
      ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
      ctx.lineWidth = p.size * (t / p.trailX.length);
      ctx.stroke();
    }

    const hx = p.trailX[p.trailX.length-1];
    const hy = p.trailY[p.trailY.length-1];
    const la = Math.min(1, p.life/20) * Math.min(1, (p.maxLife-p.life)/20);

    ctx.beginPath();
    ctx.arc(hx, hy, p.size * 1.2, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${la})`;
    ctx.fill();

    if (p.phase === 1) {
      ctx.beginPath();
      ctx.arc(hx, hy, p.size * 4, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${la*0.15})`;
      ctx.fill();
    }
  }
}

// ── Field geometry ────────────────────────────────────────────
function drawField(faces, t) {
  const { core, belt, cap } = faces;
  const temp = parseFloat(sliders.temp.value);

  // Ambient glow
  [belt.radius*1.6, belt.radius*1.3, belt.radius].forEach((r,i) => {
    const g = ctx.createRadialGradient(cx,cy,r*0.1,cx,cy,r);
    g.addColorStop(0,'rgba(255,107,0,0)');
    g.addColorStop(1,`rgba(255,107,0,${0.025-i*0.007})`);
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  });

  // Belt rings — slightly tighter with GS=1.02
  for (let i=0;i<3;i++) {
    const pulse = 1 + 0.04*Math.sin(t*1.5+i);
    ctx.beginPath();
    ctx.arc(cx,cy,belt.radius*pulse*(1+i*0.07),0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,107,0,${0.38-i*0.1})`;
    ctx.lineWidth=2-i*0.5; ctx.stroke();
  }

  // Field lines
  for (let i=0;i<24;i++) {
    const a  = (i/24)*Math.PI*2 + angle;
    const warp = 1 + 0.10*Math.sin(a*3+t);
    const r0 = core.throat*0.5, r1 = belt.radius*warp;
    const x0=cx+Math.cos(a)*r0, y0=cy+Math.sin(a)*r0;
    const x1=cx+Math.cos(a)*r1, y1=cy+Math.sin(a)*r1;
    const grad=ctx.createLinearGradient(x0,y0,x1,y1);
    grad.addColorStop(0,'rgba(0,255,204,0.22)');
    grad.addColorStop(0.5,'rgba(255,107,0,0.10)');
    grad.addColorStop(1,'rgba(204,0,255,0.03)');
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1);
    ctx.strokeStyle=grad; ctx.lineWidth=0.6; ctx.stroke();
  }

  // Cap arcs
  [-1,1].forEach(dir => {
    const pulse = 1+0.05*Math.sin(t*2*dir);
    const yOff  = dir*cap.radius*0.85*pulse;
    ctx.beginPath(); ctx.save();
    ctx.translate(cx, cy+yOff);
    ctx.scale(1, dir*0.28);
    ctx.arc(0,0,belt.radius*0.95,0,Math.PI,dir<0);
    ctx.restore();
    ctx.strokeStyle='rgba(204,0,255,0.55)';
    ctx.lineWidth=1.5; ctx.stroke();
  });

  // Core ellipses
  [0.18,0.28,0.40].forEach((scale,i) => {
    const pulse=1+0.06*Math.sin(t*3+i*1.2);
    const rx=core.throat*pulse, ry=rx*0.35;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle*0.5);
    ctx.beginPath();
    ctx.ellipse(0,0,rx*(1+scale),ry*(1+scale*0.5),0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,255,204,${0.5-i*0.15})`;
    ctx.lineWidth=1.8-i*0.4; ctx.stroke(); ctx.restore();
  });

  // Core hotspot
  const hotR = core.throat*0.22*(1+0.1*Math.sin(t*5));
  const hotG = ctx.createRadialGradient(cx,cy,0,cx,cy,hotR*3);
  hotG.addColorStop(0,`rgba(255,255,255,${0.5+temp*0.5})`);
  hotG.addColorStop(0.3,'rgba(0,255,204,0.6)');
  hotG.addColorStop(1,'rgba(0,255,204,0)');
  ctx.beginPath(); ctx.arc(cx,cy,hotR*3,0,Math.PI*2);
  ctx.fillStyle=hotG; ctx.fill();

  // Toroidal marker — orbits at TOROIDAL_ROOT cadence
  const ma = angle * TOROIDAL_ROOT * 0.1;
  const mx = cx+Math.cos(ma)*belt.radius;
  const my = cy+Math.sin(ma)*belt.radius;
  ctx.beginPath(); ctx.arc(mx,my,4,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();
  ctx.beginPath(); ctx.arc(mx,my,8,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
}

// ── Status + readouts ─────────────────────────────────────────
function updateUI(faces, spin, temp, counts) {
  // Closed-loop delta
  const delta = closedLoopDelta(faces);
  document.getElementById('deltaVal').textContent = delta.toFixed(8);

  // Flux metrics
  const flux = fluxBalance(faces, spin);
  document.getElementById('intakeFlux').textContent  = flux.intakeFlux.toFixed(2);
  document.getElementById('exhaustFlux').textContent = flux.exhaustFlux.toFixed(2);
  document.getElementById('beltDensity').textContent = flux.beltDensity.toFixed(4);
  document.getElementById('capReturn').textContent   = flux.capReturn.toFixed(4);
  document.getElementById('throatV').textContent     = throatVelocity(faces, spin).toFixed(5);

  // Phase bar
  const total = particles.length || 1;
  document.getElementById('barIntake').style.width  = (counts.INTAKE  / total * 100) + '%';
  document.getElementById('barTransit').style.width = (counts.TRANSIT / total * 100) + '%';
  document.getElementById('barExhaust').style.width = (counts.EXHAUST / total * 100) + '%';
  document.getElementById('barReturn').style.width  = (counts.RETURN  / total * 100) + '%';

  // Face cards
  const cards = [
    { cls:'core',   face:faces.core, axis:'FRONT / REAR' },
    { cls:'expand', face:faces.belt, axis:'LEFT / RIGHT'  },
    { cls:'cap',    face:faces.cap,  axis:'TOP / BOTTOM'  },
  ];
  document.getElementById('status').innerHTML = cards.map(c => `
    <div class="face-card ${c.cls}">
      <div class="face-title">${c.axis}</div>
      <div class="metric">${c.face.role}<br>
        Curvature: ${c.face.curvature.toFixed(6)}<br>
        Radius: ${c.face.radius.toFixed(4)}<br>
        Throat: ${c.face.throat.toFixed(4)}
      </div>
    </div>
  `).join('');
}

// ── Main loop ─────────────────────────────────────────────────
function loop() {
  const spin     = parseFloat(sliders.spin.value);
  const pressure = parseFloat(sliders.pressure.value);
  const temp     = parseFloat(sliders.temp.value);
  const beltMod  = parseFloat(sliders.belt.value);

  angle += 0.008 * spin * GEAR_SHIFT;
  time  += 0.016;

  const faces = computeFaces(spin, pressure, temp, beltMod);

  ctx.clearRect(0,0,W,H);
  const bg = ctx.createRadialGradient(cx,cy,0,cx,cy,W*0.7);
  bg.addColorStop(0,'rgba(0,20,40,0.96)');
  bg.addColorStop(1,'rgba(3,8,16,0.96)');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  drawField(faces, time);

  const counts = updateParticles(faces, spin, temp);
  drawParticles();

  updateUI(faces, spin, temp, counts);

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
