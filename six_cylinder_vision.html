<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6-Cylindrical Boundary System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --toroidal-root: 3.20442315;
    --gear-shift: 1.04;
    --core: #00ffcc;
    --expansion: #ff6b00;
    --cap: #cc00ff;
    --bg: #030810;
    --grid: rgba(0,255,204,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--core);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridShift 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridShift {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  header {
    text-align: center;
    padding: 2rem 1rem 0.5rem;
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1rem, 4vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--core);
    text-shadow: 0 0 30px var(--core), 0 0 60px rgba(0,255,204,0.3);
  }

  header .constants {
    font-size: 0.7rem;
    opacity: 0.5;
    margin-top: 0.4rem;
    letter-spacing: 0.1em;
  }

  /* Main canvas */
  .stage {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
  }

  canvas#main {
    display: block;
    max-width: 600px;
    width: 100%;
  }

  /* Control panel */
  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.6rem;
    padding: 0.5rem 1rem 1rem;
  }

  .ctrl-group {
    background: rgba(0,255,204,0.04);
    border: 1px solid rgba(0,255,204,0.15);
    border-radius: 6px;
    padding: 0.5rem 0.8rem;
    min-width: 140px;
  }

  .ctrl-group label {
    display: block;
    font-size: 0.6rem;
    opacity: 0.6;
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }

  .ctrl-group input[type=range] {
    width: 100%;
    accent-color: var(--core);
    cursor: pointer;
  }

  .ctrl-group .val {
    font-size: 0.65rem;
    text-align: right;
    opacity: 0.8;
    margin-top: 0.2rem;
  }

  /* Status panel */
  .status {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    padding: 0.5rem 1rem 1.5rem;
    max-width: 640px;
    margin: 0 auto;
  }

  .face-card {
    border-radius: 6px;
    padding: 0.5rem 0.6rem;
    font-size: 0.6rem;
    letter-spacing: 0.05em;
  }

  .face-card.core   { border: 1px solid var(--core);      background: rgba(0,255,204,0.05); }
  .face-card.expand { border: 1px solid var(--expansion);  background: rgba(255,107,0,0.05); }
  .face-card.cap    { border: 1px solid var(--cap);        background: rgba(204,0,255,0.05); }

  .face-card .face-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    letter-spacing: 0.1em;
  }

  .face-card.core   .face-title { color: var(--core); }
  .face-card.expand .face-title { color: var(--expansion); }
  .face-card.cap    .face-title { color: var(--cap); }

  .face-card .metric { opacity: 0.75; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <h1>6-CYLINDRICAL BOUNDARY SYSTEM</h1>
  <div class="constants">TOROIDAL ROOT: 3.20442315 &nbsp;|&nbsp; GEAR SHIFT: 1.04 &nbsp;|&nbsp; SHADOW: 1.03</div>
</header>

<div class="stage">
  <canvas id="main" width="600" height="600"></canvas>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Spin Velocity</label>
    <input type="range" id="spin" min="0.1" max="5" step="0.1" value="1.5">
    <div class="val" id="spinVal">1.5</div>
  </div>
  <div class="ctrl-group">
    <label>Pressure</label>
    <input type="range" id="pressure" min="0.2" max="2" step="0.05" value="1">
    <div class="val" id="pressureVal">1.00</div>
  </div>
  <div class="ctrl-group">
    <label>Temp Spike</label>
    <input type="range" id="temp" min="0" max="1" step="0.01" value="0">
    <div class="val" id="tempVal">0.00</div>
  </div>
  <div class="ctrl-group">
    <label>Expansion Belt</label>
    <input type="range" id="belt" min="0.5" max="2" step="0.05" value="1">
    <div class="val" id="beltVal">1.00</div>
  </div>
</div>

<div class="status" id="status"></div>

<script>
const TOROIDAL = 3.20442315;
const GEAR     = 1.04;
const SHADOW   = 1.03;

const canvas = document.getElementById('main');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2;

// Sliders
const sliders = {
  spin:     document.getElementById('spin'),
  pressure: document.getElementById('pressure'),
  temp:     document.getElementById('temp'),
  belt:     document.getElementById('belt'),
};
const vals = {
  spin:     document.getElementById('spinVal'),
  pressure: document.getElementById('pressureVal'),
  temp:     document.getElementById('tempVal'),
  belt:     document.getElementById('beltVal'),
};

Object.keys(sliders).forEach(k => {
  sliders[k].addEventListener('input', () => {
    vals[k].textContent = parseFloat(sliders[k].value).toFixed(2);
  });
});

// State
let angle = 0;
let time  = 0;

// Derive 6 face curvatures from system state
function computeFaces(spin, pressure, temp, belt) {
  // Core Axis (Front/Rear) — intake & exhaust
  const coreCurvature  = (TOROIDAL / Math.PI) * spin * SHADOW;
  const coreRadius     = 60 * pressure / coreCurvature;
  const coreThroat     = coreRadius * (1 - 0.15 * temp);

  // Expansion Belt (Left/Right) — centrifugal ring
  const beltCurvature  = coreCurvature * GEAR * belt;
  const beltRadius     = coreRadius * beltCurvature;

  // Containment Caps (Top/Bottom) — inverse deformation
  const capCurvature   = 1 / (beltCurvature * SHADOW);
  const capRadius      = beltRadius * capCurvature;

  return {
    core:  { curvature: coreCurvature,  radius: coreRadius,  throat: coreThroat,  label: 'FRONT/REAR',  role: 'Intake · Exhaust' },
    belt:  { curvature: beltCurvature,  radius: beltRadius,  throat: beltRadius,  label: 'LEFT/RIGHT',  role: 'Expansion Belt'   },
    cap:   { curvature: capCurvature,   radius: capRadius,   throat: capRadius,   label: 'TOP/BOTTOM',  role: 'Containment Caps' },
  };
}

function drawVortexLayer(faces, t) {
  const { core, belt, cap } = faces;
  const spin = parseFloat(sliders.spin.value);
  const temp = parseFloat(sliders.temp.value);

  // ── Background glow rings ──
  [belt.radius * 1.6, belt.radius * 1.3, belt.radius].forEach((r, i) => {
    const g = ctx.createRadialGradient(cx, cy, r*0.1, cx, cy, r);
    g.addColorStop(0, `rgba(255,107,0,0)`);
    g.addColorStop(1, `rgba(255,107,0,${0.03 - i*0.008})`);
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();
  });

  // ── Expansion Belt ring (Left/Right) ──
  for (let i = 0; i < 3; i++) {
    const pulse = 1 + 0.04 * Math.sin(t * 1.5 + i);
    ctx.beginPath();
    ctx.arc(cx, cy, belt.radius * pulse * (1 + i*0.07), 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,107,0,${0.5 - i*0.15})`;
    ctx.lineWidth = 2.5 - i*0.6;
    ctx.stroke();
  }

  // ── Spinning field lines ──
  const N = 36;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2 + angle;
    const warp = 1 + 0.12 * Math.sin(a * 3 + t);
    const r0 = core.throat * 0.5;
    const r1 = belt.radius * warp;

    const x0 = cx + Math.cos(a) * r0;
    const y0 = cy + Math.sin(a) * r0;
    const x1 = cx + Math.cos(a) * r1;
    const y1 = cy + Math.sin(a) * r1;

    const grad = ctx.createLinearGradient(x0, y0, x1, y1);
    grad.addColorStop(0,   `rgba(0,255,204,0.9)`);
    grad.addColorStop(0.5, `rgba(255,107,0,0.5)`);
    grad.addColorStop(1,   `rgba(204,0,255,0.1)`);

    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // ── Containment Cap arcs (Top/Bottom) ──
  [-1, 1].forEach(dir => {
    const pulse = 1 + 0.05 * Math.sin(t * 2 * dir);
    const yOff  = dir * cap.radius * 0.85 * pulse;

    // Curved cap arc
    ctx.beginPath();
    ctx.save();
    ctx.translate(cx, cy + yOff);
    ctx.scale(1, dir * 0.28);
    ctx.arc(0, 0, belt.radius * 0.95, 0, Math.PI, dir < 0);
    ctx.restore();
    ctx.strokeStyle = `rgba(204,0,255,0.7)`;
    ctx.lineWidth = 1.8;
    ctx.stroke();
  });

  // ── Core Axis ellipses (Front/Rear) ──
  [0.18, 0.28, 0.40].forEach((scale, i) => {
    const pulse = 1 + 0.06 * Math.sin(t * 3 + i * 1.2);
    const rx = core.throat * pulse;
    const ry = rx * 0.35;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle * 0.5);
    ctx.beginPath();
    ctx.ellipse(0, 0, rx * (1 + scale), ry * (1 + scale * 0.5), 0, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(0,255,204,${0.7 - i * 0.2})`;
    ctx.lineWidth = 2 - i * 0.4;
    ctx.stroke();
    ctx.restore();
  });

  // ── Core hot spot ──
  const hotR = core.throat * 0.22 * (1 + 0.1 * Math.sin(t * 5));
  const hotG = ctx.createRadialGradient(cx, cy, 0, cx, cy, hotR * 3);
  hotG.addColorStop(0,   `rgba(255,255,255,${0.6 + temp * 0.4})`);
  hotG.addColorStop(0.3, `rgba(0,255,204,0.7)`);
  hotG.addColorStop(1,   `rgba(0,255,204,0)`);
  ctx.beginPath();
  ctx.arc(cx, cy, hotR * 3, 0, Math.PI * 2);
  ctx.fillStyle = hotG;
  ctx.fill();

  // ── Toroidal rotation marker ──
  const markerAngle = angle * TOROIDAL * 0.1;
  const mx = cx + Math.cos(markerAngle) * belt.radius;
  const my = cy + Math.sin(markerAngle) * belt.radius;
  ctx.beginPath();
  ctx.arc(mx, my, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(mx, my, 8, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function updateStatus(faces) {
  const cards = [
    { cls: 'core',   face: faces.core,  axis: 'FRONT / REAR' },
    { cls: 'expand', face: faces.belt,  axis: 'LEFT / RIGHT'  },
    { cls: 'cap',    face: faces.cap,   axis: 'TOP / BOTTOM'  },
  ];

  document.getElementById('status').innerHTML = cards.map(c => `
    <div class="face-card ${c.cls}">
      <div class="face-title">${c.axis}</div>
      <div class="metric">${c.face.role}<br>
        Curvature: ${c.face.curvature.toFixed(4)}<br>
        Radius: ${c.face.radius.toFixed(2)}<br>
        Throat: ${c.face.throat.toFixed(2)}
      </div>
    </div>
  `).join('');
}

function loop() {
  const spin     = parseFloat(sliders.spin.value);
  const pressure = parseFloat(sliders.pressure.value);
  const temp     = parseFloat(sliders.temp.value);
  const belt     = parseFloat(sliders.belt.value);

  // Advance angle by spin, modulated by gear shift
  angle += (0.008 * spin * GEAR);
  time  += 0.016;

  const faces = computeFaces(spin, pressure, temp, belt);

  ctx.clearRect(0, 0, W, H);

  // Deep background
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, W*0.7);
  bg.addColorStop(0, 'rgba(0,20,40,0.95)');
  bg.addColorStop(1, 'rgba(3,8,16,0.95)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawVortexLayer(faces, time);

  // Label overlays
  ctx.font = '600 9px "Share Tech Mono"';
  ctx.fillStyle = 'rgba(0,255,204,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText(`TR: ${TOROIDAL} · GS: ${GEAR} · SH: ${SHADOW}`, cx, H - 12);

  updateStatus(faces);
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
